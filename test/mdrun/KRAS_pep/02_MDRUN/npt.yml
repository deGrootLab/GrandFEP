dt: 0.004           # in ps, with HMR
tau_t: 1.0          # in ps
ref_t: 298.15       # in K
gen_vel : false
gen_temp: 270
integrator: "LangevinMiddleIntegrator"

# position restraint
restraint    : false
restraint_fc : 1000.0 # kJ/mol/nm^2, 1/2 * k * (x-x0)^2


ncycle_dcd : 10                # RE write a dcd/rst7 file every XXX re_cycles
calc_neighbor_only : true      # true for MBAR, false for BAR only
md_gc_re_protocol:
  - ["MD", 100 ] # 100 * 0.004 ps = 0.4 ps
  - ["RE", 1   ]

# window Indices                            0,             1,             2,             3,             4,             5,             6,             7,
